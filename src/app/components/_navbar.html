<header class="fixed w-full z-50 bg-slate-900/95 backdrop-blur border-b border-slate-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <a [routerLink]="['/']" class="flex-shrink-0 text-white font-bold text-xl tracking-tighter" aria-label="Go to homepage">
        Dev<span class="text-indigo-500">.</span>Portfolio
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex space-x-8" role="navigation">
        <a [routerLink]="['/']" 
           routerLinkActive="text-indigo-400" 
           [class.text-slate-300]="true" 
           class="hover:text-white transition-colors font-medium">
          Home
        </a>
        <a [routerLink]="['/about']" 
           routerLinkActive="text-indigo-400" 
           [class.text-slate-300]="true" 
           class="hover:text-white transition-colors font-medium">
          About
        </a>
        <a [routerLink]="['/projects']" 
           routerLinkActive="text-indigo-400" 
           [class.text-slate-300]="true" 
           class="hover:text-white transition-colors font-medium">
          Projects
        </a>
        <a [routerLink]="['/contact']" 
           routerLinkActive="text-indigo-400" 
           [class.text-slate-300]="true" 
           class="hover:text-white transition-colors font-medium">
          Contact
        </a>
      </nav>

      <!-- Mobile Button -->
      <div class="md:hidden flex items-center">
        <p-button (onClick)="toggleMenu()" icon="pi pi-bars" text outlined severity="secondary" aria-label="Toggle navigation menu"></p-button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) &#123;
  <div class="md:hidden bg-slate-800 border-b border-slate-700 shadow-lg">
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
      <a [routerLink]="['/']" (click)="isMobileMenuOpen.set(false)" class="block px-3 py-2 rounded-md text-base font-medium text-white hover:bg-slate-700">Home</a>
      <a [routerLink]="['/about']" (click)="isMobileMenuOpen.set(false)" class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700">About</a>
      <a [routerLink]="['/projects']" (click)="isMobileMenuOpen.set(false)" class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700">Projects</a>
      <a [routerLink]="['/contact']" (click)="isMobileMenuOpen.set(false)" class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700">Contact</a>
    </div>
  </div>
  &#125;
</header>

<!-- Main Content Slot -->
<main class="pt-16 min-h-screen flex flex-col bg-slate-950">
  <ng-content></ng-content>
</main>

<!-- Footer -->
<footer class="bg-slate-900 border-t border-slate-800 mt-auto">
  <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <p class="text-center text-slate-400 text-sm">
      &copy; {{ currentYear() }} DevPortfolio. Built with AnalogJS & Angular.
    </p>
  </div>
</footer>
